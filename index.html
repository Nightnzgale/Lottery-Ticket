<!DOCTYPE html>

<html>

<head>

    <title>Sylveon's Lottery</title>

<body>

  <div>
    <img class="bow"
    src="./resources/bow.png"
    alt="Pink bow">
  </div>

  <div class="big_invis">

      <!-- LEFT SIDE -->

  <div class="left_box">

      <div class="left_header">
          <h1>Sylveon's Lottery</h1>
      </div>

      <div class="rules_button">

          <div>
              <img class="happy_sylveon"
              src="./resources/pokeball.png"
              alt="Pokeball">
          </div>

              RULES
          </div>

      </div>

      

      <div class="eevee_button">

          <div>
              <img class="happy_sylveon"
              src="./resources/happy_sylveon.gif"

          </div>

              EEVEES
          </div>

      </div>

      <div>
          <img class="sitting_sylveon"
          src="./resources/sitting_sylveon.gif"
          alt="Sitting Sylveon">
      </div>

  </div>

  <!-- RIGHT SIDE -->

  <div class="right_box">

      <div class="blue_right_box">

          <div class="white_right_box">

              <div class="lottery_header">

                  <img class="sylveon_head"
                  src="./resources/sylveon_face.png"
                  alt="Sylveon Header">

              </div>

              <div class="top_ticket_bar">

                  <div class="ticket_cost">
                      $10 TICKET
                  </div>

                  <div class="money_display">
                      TOP PRIZE: $9999999999
                  </div>

              </div>

              <div class="tile_box">

                  <div class="row">

                      <div class="box">
                        <img class="animated_pokeball" src="./resources/animated_pokeball.gif "alt="Pokeball">
                      </div>
                      <div class="box">
                        <img class="animated_pokeball" src="./resources/animated_pokeball.gif "alt="Pokeball">
                      </div>
                      <div class="box">
                        <img class="animated_pokeball" src="./resources/animated_pokeball.gif "alt="Pokeball">
                      </div>

                  </div>

                  <div class="row">

                      <div class="box">
                        <img class="animated_pokeball" src="./resources/animated_pokeball.gif "alt="Pokeball">
                      </div>
                      <div class="box">
                        <img class="animated_pokeball" src="./resources/animated_pokeball.gif "alt="Pokeball">
                      </div>
                      <div class="box">
                        <img class="animated_pokeball" src="./resources/animated_pokeball.gif "alt="Pokeball">
                      </div>

                  </div>

                  <div class="row">

                      <div class="box">

                      </div>
                      <div class="box">
                        <img class="animated_pokeball" src="./resources/animated_pokeball.gif "alt="Pokeball">
                      </div>
                      <div class="box">
                        <img class="animated_pokeball" src="./resources/animated_pokeball.gif "alt="Pokeball">
                      </div>

                  </div>

              </div>

              

          </div>

      </div>
